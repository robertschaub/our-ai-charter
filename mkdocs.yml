# MkDocs configuration for the Our AI Charter website.
#
# Published content lives in docs/ (MkDocs requires docs_dir to be a child of
# the config file's directory). Repo-meta files (README, AGENTS, CHANGELOG,
# CONTRIBUTING, SECURITY, LICENSE, NOTICE) stay at the repo root and are not
# part of the website. Navigation is defined explicitly below.

site_name: Our AI Charter
site_description: Public AI infrastructure for free societies — trustworthy, inspectable, and accountable to people.
site_url: https://robertschaub.github.io/our-ai-charter/
site_author: Robert Schaub

repo_url: https://github.com/robertschaub/our-ai-charter
repo_name: robertschaub/our-ai-charter
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site

copyright: >
  Document texts © Robert Schaub, licensed CC BY 4.0. The initiative's name and any trust mark are reserved.

extra_css:
  - stylesheets/extra.css

theme:
  name: material
  language: en
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.action.edit
    - content.action.view
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to system preference

plugins:
  - search
  # Social cards (per-page link-preview images) need native image libraries
  # (Cairo/Pango), installed in CI. Enabled only when CI=true so local builds
  # work without them. See the deploy workflow.
  - social:
      enabled: !ENV [CI, false]

markdown_extensions:
  - abbr
  - admonition
  # Renders GitHub-style alerts (> [!NOTE] / [!TIP] / [!WARNING]) as Material
  # admonitions, so the per-doc status callouts also render natively on GitHub.
  - github-callouts
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  # Auto-link bare URLs and email addresses (so plain-text links are clickable).
  - pymdownx.magiclink
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tabbed:
      alternate_style: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/robertschaub/our-ai-charter
      name: Repository on GitHub
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/robertschaub
      name: Robert Schaub on LinkedIn
    - icon: fontawesome/solid/envelope
      link: mailto:info@factharbor.ch
      name: Contact

nav:
  - Home: index.md
  - Start here: start-here.md
  - Public AI Network:
      - Overview: Public AI Network/briefing.md
      - The Public AI Network: Public AI Network/Published/the-public-ai-network.md
      - "AI Sovereignty and Resilience (EN)": Public AI Network/Published/ai-sovereignty-and-resilience.md
      - "KI-Souveränität und Resilienz (DE)": Public AI Network/Published/ki-souveraenitaet-und-resilienz.md
      - Evidence:
          - Verified findings: Public AI Network/Evidence/verified-findings.md
          - Actors & landscape: Public AI Network/Evidence/actors-and-landscape.md
          - Linked sources: Public AI Network/Evidence/linked-sources.md
      - Strategy:
          - Initiation strategy: Public AI Network/Strategy/initiation-strategy.md
          - Geneva 2027 — contribution routes and partners: Public AI Network/Strategy/geneva-2027-options.md
          - Geneva 2027 — Swissnex/Mercator fellowship & plan: Public AI Network/Strategy/geneva-2027-swissnex-fellowship.md
          - Digital-sovereignty motions (24.3209 + 26.3221): Public AI Network/Strategy/digital-sovereignty-motions.md
          - Federated public compute architecture: Public AI Network/Strategy/federated-public-compute-architecture.md
          - Swiss Action-Plan contribution: Public AI Network/Strategy/swiss-action-plan-contribution.md
      - Outreach:
          - "Non-Paper (EN)": Public AI Network/Outreach/non-paper.en.md
          - "Non-Paper (DE)": Public AI Network/Outreach/non-paper.de.md
          - "Action Plan (EN)": Public AI Network/Outreach/action-plan.en.md
          - "Aktionsplan (DE)": Public AI Network/Outreach/action-plan.de.md
          - "Postulate (EN)": Public AI Network/Outreach/postulat.en.md
          - "Postulat (DE)": Public AI Network/Outreach/postulat.de.md
      - Working notes:
          - Overview: wip/README.md
          - Artifact-production plan: wip/artifact-production-plan.md
          - Final-artifacts roadmap: wip/final-artifacts-roadmap.md
          - "Geneva 2027 — channel demand": wip/geneva-2027-channel-demand.md
          - "Geneva 2027 — keystone memo": wip/geneva-2027-keystone-memo.md
  - AI Assurance & Certification:
      - Trustworthy AI, Accountable to People: AI Assurance and Certification/Published/trustworthy-ai-accountable-to-people.md
      - The Founding Accord: AI Assurance and Certification/Framework/founding-accord.md
      - Certification model: AI Assurance and Certification/Framework/certification-model.md
      - Protocol:
          - "Grounding, Faithfulness & Contestability": AI Assurance and Certification/Protocol/grounding-faithfulness-and-contestability.md
          - One-pager: AI Assurance and Certification/Protocol/one-pager.md
      - Background:
          - Risk & vulnerability audit: AI Assurance and Certification/Background/risk-and-vulnerability-audit.md
          - What the world has already declared: AI Assurance and Certification/Background/what-the-world-has-already-declared.md
          - Landscape & positioning: AI Assurance and Certification/Background/landscape-and-positioning.md
  - Program map: PROGRAM.md
