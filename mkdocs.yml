# MkDocs configuration for the Our AI Charter website.
#
# Published content lives in docs/ (MkDocs requires docs_dir to be a child of
# the config file's directory). Repo-meta files (README, AGENTS, CHANGELOG,
# CONTRIBUTING, SECURITY, LICENSE, NOTICE) stay at the repo root and are not
# part of the website. Navigation is defined explicitly below.

site_name: Our AI Charter
site_description: Public AI infrastructure for free societies — trustworthy, inspectable, and accountable to people.
site_url: https://robertschaub.github.io/our-ai-charter/
site_author: Robert Schaub

repo_url: https://github.com/robertschaub/our-ai-charter
repo_name: robertschaub/our-ai-charter
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site

copyright: >
  Document texts © Robert Schaub, licensed CC BY 4.0. The initiative's name and any trust mark are reserved.

extra_css:
  - stylesheets/extra.css

theme:
  name: material
  language: en
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.action.edit
    - content.action.view
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to system preference

plugins:
  - search
  # Social cards (per-page link-preview images) need native image libraries
  # (Cairo/Pango), installed in CI. Enabled only when CI=true so local builds
  # work without them. See the deploy workflow.
  - social:
      enabled: !ENV [CI, false]

markdown_extensions:
  - abbr
  - admonition
  # Renders GitHub-style alerts (> [!NOTE] / [!TIP] / [!WARNING]) as Material
  # admonitions, so genuine in-body alerts render natively on GitHub too.
  # (Status banners are plain "> **Status: …**" blockquotes, not callouts.)
  - github-callouts
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  # Auto-link bare URLs and email addresses (so plain-text links are clickable).
  - pymdownx.magiclink
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tabbed:
      alternate_style: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/robertschaub/our-ai-charter
      name: Repository on GitHub
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/robertschaub
      name: Robert Schaub on LinkedIn
    - icon: fontawesome/solid/envelope
      link: mailto:info@factharbor.ch
      name: Contact

